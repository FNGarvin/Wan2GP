# sage-wheels.yml
# Manually-triggered workflow that extracts the pre-compiled SageAttention wheel
# from the sage-compile build stage and publishes it as a GitHub pre-release asset.
#
# How it works:
#   1. Builds the 'sage-compile' Dockerfile stage using the GHA BuildKit cache.
#      If a successful docker-build.yml run has completed, this stage is a full
#      cache hit and completes in seconds — no NVCC recompilation.
#   2. Runs a short-lived container from that image to copy out dist/*.whl.
#   3. Creates a GitHub pre-release tagged sage-<version>-cu128-cp310 and
#      uploads the wheel as an asset.
#
# Once a wheel is published, update the 'deps' stage in the Dockerfile to
# install from the release URL instead of compiling from source:
#
#   RUN pip install --no-deps \
#       https://github.com/<owner>/Wan2GP/releases/download/<tag>/<wheel>.whl
#
# To trigger: Actions tab → "SageAttention Pre-built Wheel" → Run workflow.
---
name: SageAttention Pre-built Wheel

on:
  workflow_dispatch:
    inputs:
      sage_tag:
        description: SageAttention git tag baked into the current Dockerfile
        required: true
        default: v2.2.0

jobs:
  build-wheels:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ampere-ada-rtx-30-40
            arch: "8.0;8.6;8.9"
            suffix: ampere-ada-rtx30-40
          - name: hopper-h100-h200
            arch: "9.0;10.0"
            suffix: hopper-h100-h200
          - name: blackwell-rtx-50
            arch: "12.0+PTX"
            suffix: blackwell-rtx50

    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Build stage
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          target: sage-tools
          load: true
          push: false
          tags: sage-tools-${{ matrix.suffix }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            CUDA_ARCHITECTURES=${{ matrix.arch }}

      - name: Extract and rename wheel
        run: |
          mkdir -p dist
          docker run --rm \
            -v "$(pwd)/dist:/out" \
            sage-tools-${{ matrix.suffix }}:latest \
            bash -c "cp /tmp/sa_dist/*.whl /out/"
          
          # Rename for descriptive release
          ORIG_WHEEL=$(ls dist/*.whl | head -1)
          SAGE_VERSION=$(grep -oP 'ARG SAGE_VERSION="\K[v0-9.]+' Dockerfile | head -1)
          NEW_WHEEL="sageattention-${SAGE_VERSION}-cp310-linux_x86_64-${{ matrix.suffix }}.whl"
          mv "$ORIG_WHEEL" "dist/$NEW_WHEEL"
          ls -lh dist/

      - name: Publish to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          WHEEL=$(ls dist/*.whl | head -1)
          WHEEL_NAME=$(basename "$WHEEL")
          SAGE_VERSION=$(grep -oP 'ARG SAGE_VERSION="\K[v0-9.]+' Dockerfile | head -1)
          TAG="sage-${SAGE_VERSION}-cu128-cp310"

          # Use a lock-file approach to ensure the release is created exactly once
          # but allow all parallel jobs to upload to it.
          gh release view "$TAG" || gh release create "$TAG" \
            --title "SageAttention ${SAGE_VERSION} Parallel Factory (CUDA 12.8)" \
            --notes "Parallel architecture-specific wheels for Wan2GP." \
            --prerelease --latest=false

          gh release upload "$TAG" "$WHEEL" --clobber
